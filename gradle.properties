kotlin.code.style=official
org.gradle.jvmargs=-Xmx1g -Dfile.encoding=UTF-8

# Use the bundled JDK 21 from Eclipse Adoptium
org.gradle.java.home=C\:\\Program Files\\Eclipse Adoptium\\jdk-21.0.11.10-hotspot

# Bypass AGP 9.0 incompatibility with `org.jetbrains.kotlin.multiplatform` plugin.
# AGP 9.0+ has built-in Kotlin support and refuses to coexist with the KMP plugin.
# We set both flags to restore the pre-9.0 behaviour where KMP is responsible for
# the Kotlin compilation and AGP only handles Android resources / manifest.
android.builtInKotlin=false
android.newDsl=false
